{% extends "superadmin/base_superadmin.html" %}

{% block content %}
<div style="padding: 40px; max-width: 1000px; margin: auto;">
    <form method="POST" enctype="multipart/form-data" style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05);">
        {% csrf_token %}
        <h2 style="color: #4B2E2B; margin-bottom: 30px;">Manual Intern Registration</h2>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px;">
            <div>
                <label>Full Name</label>
                <input type="text" name="full_name" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;">
            </div>
            <div>
                <label>Email</label>
                <input type="email" name="email" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;">
            </div>
            <div>
                <label>Phone</label>
                <input type="text" name="phone" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;">
            </div>
        </div>
        <div>
    <label>CGPA</label>
    <input type="number" name="cgpa" step="0.01" min="0" max="4.0" placeholder="e.g. 3.75" 
           style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;">
</div>

<div>
    <label>Resume (PDF Only)</label>
    <input type="file" name="resume" accept=".pdf" required>
    <small style="color: #94a3b8; display: block;">Accepted: PDF only. Max size: {{ dept.max_file_size_mb }}MB</small>
</div>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px;">
            <div>
                
                <label>University</label>
                <input type="text" name="university" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;">
            </div>
            <div>
                <label>College</label>
                <input type="text" name="college_name" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;">
            </div>
            <div>
                <label>CGPA</label>
                <input type="number" step="0.01" name="cgpa" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;">
            </div>
        </div>
       

        <div style="background: #FFF8F0; padding: 20px; border-radius: 12px; margin-bottom: 30px;">
            <h4 style="margin-top:0; color: #8B5E3C;">Required Documents</h4>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <input type="file" name="resume">
                <input type="file" name="recommendation_letter">
            </div>
        </div>

        <button type="submit" style="background: #4B2E2B; color: white; padding: 15px 40px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer;">
            Finalize Manual Entry
        </button>
    </form>
</div>
{% endblock %}
