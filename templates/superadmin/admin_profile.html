{% extends "superadmin/base_superadmin.html" %}
{% block content %}
<div style="padding: 40px; max-width: 800px;">
    <div style="background: white; border-radius: 20px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
        <h2 style="color: #4B2E2B;">Profile: {{ staff.username }}</h2>
        <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 20px 0;">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label style="color: #94a3b8; font-size: 12px; font-weight: 700;">EMAIL ADDRESS</label>
                <p style="color: #4B2E2B; font-weight: 600;">{{ staff.email }}</p>
            </div>
            <div>
                <label style="color: #94a3b8; font-size: 12px; font-weight: 700;">CURRENT ROLE</label>
                <p style="color: #C08552; font-weight: 600;">{{ staff.role|upper }}</p>
            </div>
        </div>

        <h3 style="margin-top: 40px; font-size: 16px; color: #4B2E2B;">Recent Activity</h3>
        <div style="background: #FFF8F0; padding: 15px; border-radius: 10px;">
            {% for log in staff_logs %}
                <p style="font-size: 13px; color: #8B5E3C; border-bottom: 1px solid rgba(0,0,0,0.05); padding: 5px 0;">
                    {{ log.action }} <span style="float: right; opacity: 0.6;">{{ log.timestamp|date:"M d" }}</span>
                </p>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
