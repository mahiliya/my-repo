{% extends "admin/base_site.html" %}
{% block content %}
<style>
    :root {
        --bg-cream: #FFF8F0;
        --accent-tan: #C08552;
        --deep-espresso: #4B2E2B;
        --white: #ffffff;
    }
    body { background-color: var(--bg-cream); font-family: 'Inter', sans-serif; }
    
    .form-container {
        max-width: 550px;
        margin: 60px auto;
        background: var(--white);
        padding: 45px;
        border-radius: 28px;
        box-shadow: 0 20px 40px rgba(75, 46, 43, 0.06);
    }
    .ssgi-input {
        width: 100%; padding: 15px; border: 2px solid var(--bg-cream);
        background: var(--bg-cream); border-radius: 12px; margin-top: 8px;
    }
    .btn-update {
        background: var(--deep-espresso); color: var(--bg-cream);
        padding: 16px; border: none; border-radius: 12px;
        width: 100%; cursor: pointer; font-weight: 700; margin-top: 20px;
    }
</style>

<div class="form-container">
    <h2 style="color: var(--deep-espresso);">Edit Department</h2>
    <p style="color: var(--accent-tan);">Modify details for {{ dept.name }}</p>

    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <label style="font-weight: 700;">Department Name</label>
            <input type="text" name="name" class="ssgi-input" value="{{ dept.name }}" required>
        </div>
        <div style="margin-bottom: 20px;">
            <label style="font-weight: 700;">Description</label>
            <textarea name="description" class="ssgi-input" rows="5">{{ dept.description }}</textarea>
        </div>
        <button type="submit" class="btn-update">Save Changes</button>
        <div style="text-align: center; margin-top: 20px;">
            <a href="{% url 'manage_departments' %}" style="color: var(--accent-tan); text-decoration: none;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
