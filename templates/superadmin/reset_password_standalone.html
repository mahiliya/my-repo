<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Admin Management</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
            background: rgb(46, 38, 38);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(243, 239, 239, 0.925);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #0a0808;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn {
            background: #2c3e50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: #34495e;
        }
        .cancel {
            margin-left: 10px;
            color: #eaf4f8;
            background: #181d1f;
            border: 1px solid #ddd;
        }
        .cancel:hover {
            background: #f8f9fa;
        }
        .message {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .error {
            background: #f8d7da;
            color: #f1ee30;
            border: 1px solid #f5c6cb;
        }
        .success {
            background: #d4edda;
            color: #e9c526;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Reset Password for: {{ admin_user.username }}</h2>
        <p style="color: #302323; margin-bottom: 20px;">Enter a new secure password for this administrator.</p>
        
        {% if messages %}
            {% for message in messages %}
                <div class="message {{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label style="color:#5c4033; font-weight:600;">New Password:</label>
                <input type="password" name="new_password" required
                style="background-color:white; color:#000; border:1px solid #ccc; padding:8px; border-radius:4px;">
            </div>
            <div class="form-group">
                <label style="color:#5c4033; font-weight:600;">Confirm New Password:</label>
                <input type="password" name="confirm_password" required 
                style="background-color:white; color:#000; border:1px solid #ccc; padding:8px; border-radius:4px;">
            </div>
            
            <button type="submit" class="btn">Update Password</button>
            <a href="{% url 'manage_admins' %}" class="btn cancel">Cancel</a>
        </form>
    </div>
</body>
</html>
