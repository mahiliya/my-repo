{% extends "admin/base.html" %}
{% block content %}
<div style="max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    
    <h2 style="color:#5C4033;">Reset Password for: {{ admin_user.username }}</h2>
    
    <p style="color: #666; margin-bottom: 20px;">
        Enter a new secure password for this administrator.
    </p>
    
    <form method="POST">
        {% csrf_token %}
        
        <div style="margin-bottom: 15px;">
            <label style="color:#5C4033; font-weight:600;">New Password:</label><br>
            <input type="password" name="new_password" required
                   style="width:100%; padding:10px; margin-top:5px; background:white; color:#000; border:1px solid #ccc; border-radius:4px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="color:#5C4033; font-weight:600;">Confirm New Password:</label><br>
            <input type="password" name="confirm_password" required
                   style="width:100%; padding:10px; margin-top:5px; background:white; color:#000; border:1px solid #ccc; border-radius:4px;">
        </div>
        
        <button type="submit"
            style="background:#2c3e50; color:white; padding:10px 20px; border:none; border-radius:4px; cursor:pointer;">
            Update Password
        </button>
        
        <a href="{% url 'manage_admins' %}"
           style="margin-left:10px;background:#2c3e50; color:#fffcfc; text-decoration:none;">
           Cancel
        </a>
        
    </form>
</div>
{% endblock %}
